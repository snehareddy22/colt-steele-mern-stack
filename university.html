<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admission Registration Page</title>
</head>
<body>
    <h1>University Admission Registration Page</h1>
    <table>
        <thead>
            <tr>
            <th><b>Branch</b></th>
            <th><b>Seats</b></th>
            <th><b>Duration</b></th>
            </tr>
        </thead>
        <tbody>
            <tr>
            <td>CSE</td>
            <td>180</td>
            <td>4 years</td>
            </tr>
            <tr>
            <td>ECE</td>
            <td>120</td>
            <td>4 years</td>
            </tr>
            <tr>
            <td>AIML</td>
            <td>60</td>
            <td>4 years</td>
            </tr>
            <tr>
            <td>IT</td>
            <td>60</td>
            <td>4 years</td>
            </tr>
        </tbody>
    </table>
    <h1>ADDMISSION FORM</h1>
    <form>
        <p>
        <label for="name">Enter your name:</label>
        <input id="name"  type="text">
        </p>
        <p>
        <label for="mail">Enter your email:</label>
        <input id="mail"  type="email">
        </p>
        <p>
        <label for="pass">Enter your password:</label>
        <input id="pass"  type="password">
        </p>
        <p>
        <label for="phone">Enter your phone number:</label>
        <input id="phone"  type="number" value="10">
        </p>
        <p>
        <label for="birth">Enter your Date of Birth:</label>
        <input id="birth"  type="date">
        </p> 
        <p>
        <input type="submit" value="click here to submit">
        </p>
    </form>
</body>
</html>
