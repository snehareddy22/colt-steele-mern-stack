<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Booking Website</title>
</head>
<body>
    <h1><b>Movie Ticket Booking</b></h1>

    <p>fill the below details</p>

    <form action="data">

    <p>
    <input type="text" placeholder="Enter your name" required>
    <input type="email" placeholder="Enter your Email" required>
    <input type="password" placeholder="Enter your password" minlength="10" required>
    <input type="number" placeholder="Enter your Age" min="18" max="100">
    <input type="tel" placeholder="Enter your phone Number" required>
    </p>
    <p>
    <textarea rows="5" cols="30" placeholder="Enter special instructions"></textarea>
    </p>

    <p>
    <input id="r" type="range" name="excitement level" min="1" max="10">
    <label for="r">select how much you are excited</label>
    </p>
    <p>
    <input id="v" type="range" name="select how much volume prefered" min="1" max="100">
    <label for="v">volume prefered</label>
    </p>


    <p>
    <label for="select">select the show</label>
    <select name="value"  id="select">
        <option value="Morning Show">Morning Show</option>
        <option value="Afternoon Show">Afternoon Show</option>
        <option value="Evening Show">Evening Show</option>
        <option value="Night Show">Night Show</option>
    </select>
    </p>

    <p>
        <input type="radio" name="select" id="1" value="1">
        <label for="1" >rating high</label>
        <input type="radio" name="select" id="2" value="2">
        <label for="2" >good rating</label>
        <input type="radio" name="select" id="3" value="3">
        <label for="3" >low rating</label>
    </p>
    <p>
        <input type="checkbox" name="Popcorn" id="Popcorn" checked>
        <label for="Popcorn" >Popcorn</label>
        <input type="checkbox" name="Coke" id="Coke" checked>
        <label for="Coke" >Coke</label>
        <input type="checkbox" name="Nachos" id="Nachos" checked>
        <label for="Nachos" >Nachos</label>
        <input type="checkbox" name="Ice Cream" id="Ice Cream" checked>
        <label for="Ice Cream" >Ice Cream</label>
    </p>
    <p>
    <button>submit</button>
    </p>
    </form>
</body>
</html>
